<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reproductor - Proyecto H</title>
    <style>
        /* Estilos básicos */
        body { background-color: #121212; color: white; font-family: sans-serif; padding: 10px; }
        .nav-buttons { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .btn { background: #333; color: white; padding: 10px; border-radius: 5px; text-decoration: none; }
        video { width: 100%; border-radius: 8px; }
        
        /* Cuadrícula de sugerencias */
        .sugerencias { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 20px; }
        .item { background: #1e1e1e; padding: 5px; border-radius: 5px; text-align: center; }
    </style>
</head>
<body>

    <div class="nav-buttons">
        <a href="#" class="btn" onclick="href('Anterior')">← Anterior</a>
        <a href="#" class="btn" onclick="href('Próximo')">Próximo →</a>
    </div>

    <video controls id="videoPlayer" width="100%">
    <source id="videoSource" src="" type="video/mp4">
</video>

<script>
    // 1. Obtener el nombre del video desde la URL
    const params = new URLSearchParams(window.location.search);
    const videoSeleccionado = params.get('video');

    // 2. Asignar el video al reproductor
    document.getElementById('videoSource').src = videoSeleccionado;
    document.getElementById('videoPlayer').load();

    // 3. Tus sugerencias aleatorias (puedes incluir fotos o videos)
    const contenido = ["video1.mp4", "video2.mp4", "foto1.jpg", "foto2.jpg"];

    function cargarSugerencias() {
        const contenedor = document.getElementById('sugerencias-container');
        // Mezclar aleatoriamente
        const aleatorios = contenido.sort(() => 0.5 - Math.random()).slice(0, 8);
        
        aleatorios.forEach(item => {
            const div = document.createElement('div');
            div.className = 'item';
            // Si es video, manda a cine.html, si es foto, podrías crear un visualizador de fotos
            div.innerHTML = `<p>${item}</p><a href="cine.html?video=${item}" class="btn">Ver</a>`;
            contenedor.appendChild(div);
        });
    }
    window.onload = cargarSugerencias;
</script> 
</body>
</html>
