<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; margin: 0; }
        
        /* Estilo para las tarjetas */
        .card { 
            background-color: #1e1e1e; 
            margin: 10px; 
            padding: 15px; 
            border-radius: 8px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        
        /* Botón estilo "Descargar" */
        .btn-download { 
            background-color: #ff5722; 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 5px; 
            font-weight: bold; 
            cursor: pointer; 
        }
    </style>
</head>
<body>

    <!-- Estructura de ejemplo -->
    <div class="card">
        <div>
            <h3>Minecraft-v1.21.1</h3>
            <p>1.21.1 | Mojang | 638 MB</p>
        </div>
        <button class="btn-download">Descargar</button>
    </div>

    <div class="card">
        <div>
            <h3>Vector clássic 1.4.5-v11.2.0</h3>
            </p>1.4.5 | NEKKI | 127 MB</p>
        </div>
        <button class="btn-download">Descargar</button>
    </div>

    <div class="card">
        <div>
            <h3>Video</h3>
            </p>Facebook | Emi | 27 MB</p>
        </div>
        <button class="btn-download">Descargar</button>
    </div>
    
</body>
</html>
