<!DOCTYPE html>
<html>
<body style="background-color: black; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px;">

    <!-- Imagen grande -->
    <img id="fotoGrande" src="" style="max-width: 100%; border-radius: 10px;">

    <!-- Botones de acción -->
    <div style="display: flex; gap: 15px; margin: 20px 0;">
        <button onclick="alert('¡Me gusta!')" style="padding: 10px;">❤️ Me gusta</button>
        <button onclick="alert('Guardado')" style="padding: 10px;">💾 Guardar</button>
        <button onclick="alert('Comentarios')" style="padding: 10px;">💬 Comentarios</button>
        <button onclick="toggleInfo()" style="padding: 10px;">ℹ️ Información</button>
    </div>

    <!-- Sección de información (oculta por defecto) -->
    <div id="infoSection" style="display: none; background: #222; padding: 15px; border-radius: 8px; width: 100%; max-width: 400px;">
        <p><strong>Nombre de la foto:</strong> <span id="nombreFoto"></span></p>
        <p><strong>Descripción:</strong> Esta información ayuda a que el buscador encuentre la imagen.</p>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const foto = params.get('foto');
        document.getElementById('fotoGrande').src = foto;
        document.getElementById('nombreFoto').innerText = foto;

        function toggleInfo() {
            const info = document.getElementById('infoSection');
            info.style.display = (info.style.display === 'none') ? 'block' : 'none';
        }
    </script>
</body>
</html>
